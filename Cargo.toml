[package]
name = "rurico"
version = "0.2.0"
edition = "2024"
rust-version = "1.94"
description = "Shared embedding, reranking, and storage utilities for semantic search CLIs"
license = "MIT"
repository = "https://github.com/thkt/rurico"
exclude = [".claude/", ".yomu/", "workspace/"]

[features]
test-mlx = []
test-support = []

[dependencies]
bytemuck = "1"
hf-hub = "0.5"
log = "0.4"
mlx-rs = "0.25"
mlx-sys = "0.2"
rusqlite = { version = "0.39", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlite-vec = "0.1.6"
thiserror = "2"
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }

[dev-dependencies]
serial_test = "3"
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
