[package]
name = "rurico"
version = "0.1.0"
edition = "2024"
description = "Shared embedding and storage utilities for semantic search CLIs"
license = "MIT"
repository = "https://github.com/thkt/rurico"

[features]
default = ["mlx"]
mlx = ["dep:mlx-rs"]
candle = ["dep:candle-core", "dep:candle-nn", "dep:candle-transformers"]
test-support = []

[dependencies]
bytemuck = "1"
candle-core = { version = "0.9", optional = true }
candle-nn = { version = "0.9", optional = true }
candle-transformers = { version = "0.9", optional = true }
hf-hub = "0.5"
mlx-rs = { version = "0.25", optional = true }
rusqlite = { version = "0.39", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlite-vec = "0.1.6"
thiserror = "2"
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }

[dev-dependencies]
serial_test = "3"
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
