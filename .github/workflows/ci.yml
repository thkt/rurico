name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: false

      - name: Check
        run: cargo check --workspace --features test-support,test-mlx

      - name: Install nextest
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-nextest

      - name: Test
        run: cargo nextest run --workspace --features test-support,test-mlx --profile ci

      - name: Doctests
        run: cargo test --doc --workspace --features test-support,test-mlx

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Format check
        run: cargo fmt -- --check

  coverage:
    # Diff coverage gate: fail when coverage of the lines this PR adds or
    # changes drops below the threshold, so new uncovered code (pub fn /
    # branches) cannot merge untested. No overall-percent floor (which would
    # flag existing unreachable code); no base-vs-PR double measurement.
    # Rationale: ported from yomu (Issue #223), THRESHOLDS.md "Coverage".
    # Runs on macos like the test job: mlx-sys (MLX FFI) needs BLAS + Apple
    # silicon and cannot build on Linux. Coverage mirrors the test job's
    # feature set so the measured behavior matches what the tests exercise.
    runs-on: macos-latest
    timeout-minutes: 60
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: false

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-llvm-cov

      - name: Generate lcov coverage
        run: |
          # Drop files that cannot run in CI from the diff-coverage denominator:
          # test_support mocks (test infra, downstream-only — not run by rurico's
          # own tests), the MLX backend (mlx.rs / embedder.rs run only under
          # #[ignore] with a cached model), and smoke bins (need a downloaded
          # model). Pure logic (embed.rs, reranker.rs, lazy.rs) stays measured.
          # Mirrors yomu's ignore-regex; without it new mock/MLX lines a PR
          # touches count as uncovered and fail the gate (e.g. PR #205).
          cargo llvm-cov --workspace --features test-support,test-mlx \
            --ignore-filename-regex '(test_support\.rs|/bin/|embed/(mlx|embedder)\.rs|reranker/mlx\.rs)' \
            --lcov --output-path lcov.info

      - name: Diff coverage gate (changed lines >= 95%)
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          # diff-cover is a Python tool; isolate it in a venv to avoid PEP 668
          # (externally-managed environments) regardless of the runner's Python.
          python3 -m venv /tmp/diff-cover-venv
          /tmp/diff-cover-venv/bin/pip install --quiet diff-cover
          /tmp/diff-cover-venv/bin/diff-cover lcov.info \
            --compare-branch=origin/main \
            --fail-under=95

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: false
          cache-targets: false

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Deny check
        run: cargo deny check

      - name: Audit
        run: cargo audit
